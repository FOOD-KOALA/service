name: CI for FOOD-KOALA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Pornim containerul de MongoDB pentru teste
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java (JDK 21)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto' # Folosim Corretto, ca în Dockerfile-ul tău
        cache: 'gradle'          # Cache pentru Gradle, ca să se miște mai repede

    - name: Build and Test with Gradle
      env:
        SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/testdb 
      # Comanda care compilează codul, rulează testele și creează acel .jar
      run: ./gradlew build